---
services:

  ###########################################################
  # builder
  ###########################################################

  builder:
    build:
      context: .
      tags:
        - docker01-teine.home.elysianskies.com:32501/elise/iac-deploy:main
    profiles:
      - builder

  ###########################################################
  # terraform_init
  ###########################################################

  terraform_init:
    image: docker01-teine.home.elysianskies.com:32501/elise/iac-deploy:main
    entrypoint: |
      terraform -chdir=/terraform/environment init
    profiles:
      - init

    environment:
      - TZ=America/Denver
      - LINODE_TOKEN=${LINODE_TOKEN}

    volumes:
      - type: bind
        source: terraform/environment
        target: /terraform/environment
        read_only: false

      - type: volume
        source: tvault
        target: /tfstate
        read_only: false
        volume: 
          subpath: elysianskies/tfstate

    networks:
      - iac_deploy

  ###########################################################
  # terraform_validate
  ###########################################################

  terraform_validate:
    image: docker01-teine.home.elysianskies.com:32501/elise/iac-deploy:main
    entrypoint: |
      terraform -chdir=/terraform/environment validate
    profiles:
      - validate

    environment:
      - TZ=America/Denver
      - LINODE_TOKEN=${LINODE_TOKEN}

    volumes:
      - type: bind
        source: terraform/environment
        target: /terraform/environment
        read_only: false

      - type: volume
        source: tvault
        target: /tfstate
        read_only: false
        volume: 
          subpath: elysianskies/tfstate

    networks:
      - iac_deploy

  ###########################################################
  # terraform_plan
  ###########################################################

  terraform_plan:
    image: docker01-teine.home.elysianskies.com:32501/elise/iac-deploy:main
    entrypoint: |
      terraform -chdir=/terraform/environment plan
    profiles:
      - plan

    environment:
      - TZ=America/Denver
      - LINODE_TOKEN=${LINODE_TOKEN}

    volumes:
      - type: bind
        source: terraform/environment
        target: /terraform/environment
        read_only: false

      - type: volume
        source: tvault
        target: /tfstate
        read_only: false
        volume: 
          subpath: elysianskies/tfstate

    networks:
      - iac_deploy

  ###########################################################
  # terraform_apply
  ###########################################################

  terraform_apply:
    image: docker01-teine.home.elysianskies.com:32501/elise/iac-deploy:main
    entrypoint: |
      terraform -chdir=/terraform/environment apply -auto-approve
    profiles:
      - apply

    environment:
      - TZ=America/Denver
      - LINODE_TOKEN=${LINODE_TOKEN}

    volumes:
      - type: bind
        source: terraform/environment
        target: /terraform/environment
        read_only: false

      - type: volume
        source: tvault
        target: /tfstate
        read_only: false
        volume: 
          subpath: elysianskies/tfstate

    networks:
      - iac_deploy

  ###########################################################
  # terraform_destroy
  ###########################################################

  terraform_destroy:
    image: docker01-teine.home.elysianskies.com:32501/elise/iac-deploy:main
    entrypoint: |
      terraform
        -chdir=/terraform/environment destroy 
        -target module.domain_elysianskies
        -target module.firewall_elysianskies
        -target module.instance_portal
        -target module.vpc_elysianskies
        -auto-approve
    profiles:
      - destroy

    environment:
      - TZ=America/Denver
      - LINODE_TOKEN=${LINODE_TOKEN}

    volumes:
      - type: bind
        source: terraform/environment
        target: /terraform/environment
        read_only: false

      - type: volume
        source: tvault
        target: /tfstate
        read_only: false
        volume: 
          subpath: elysianskies/tfstate

    networks:
      - iac_deploy

  ###########################################################
  # terraform_output
  ###########################################################

  terraform_output:
    image: docker01-teine.home.elysianskies.com:32501/elise/iac-deploy:main
    entrypoint: |
      terraform -chdir=/terraform/environment output
    profiles:
      - output

    environment:
      - TZ=America/Denver
      - LINODE_TOKEN=${LINODE_TOKEN}

    volumes:
      - type: bind
        source: terraform/environment
        target: /terraform/environment
        read_only: false

      - type: volume
        source: tvault
        target: /tfstate
        read_only: false
        volume: 
          subpath: elysianskies/tfstate

    networks:
      - iac_deploy

###########################################################
# resources
###########################################################

volumes:
  tvault:
    driver_opts:
      type: cifs
      o: username=${TVAULT_USERNAME},password=${TVAULT_PASSWORD},uid=1000,gid=1000,iocharset=utf8
      device: //172.16.16.4/tvault

networks:
  iac_deploy:
    name: iac_deploy
