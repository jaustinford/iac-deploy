---
.terraform_init: &terraform_init
  terraform -chdir=terraform/environment init

terraform_apply:
  image:
    name: $ELISE_CI_DOCKER_IMAGE
    entrypoint: [""]
  stage: deploy
  needs:
    - job: build_terraform
      optional: false
  variables:
    TF_VAR_tag_ci_pipeline_id: $CI_PIPELINE_ID
  script:
    - *terraform_init
    - terraform -chdir=terraform/environment apply -auto-approve

playbook_site:
  stage: trigger
  variables:
    ELISE_CI_DOCKER_IMAGE: $ELISE_CI_NEXUS_DOCKER_HOSTED/elise/iac-configure:$CI_COMMIT_REF_SLUG
  needs:
    - job: terraform_apply
      optional: false
  trigger:
    strategy: depend
    project: elise/infrastructure/iac-configure
