---
terragrunt_apply:
  image:
    name: $ELISE_CI_NEXUS_DOCKER_HOSTED/elise/iac-deploy:$CI_COMMIT_REF_SLUG
    entrypoint: [""]
  stage: deploy
  needs:
    - build_docker
  script:
    - |
      terragrunt run-all apply \
          --terragrunt-non-interactive

trigger_ansible_playbook:
  stage: trigger
  variables:
    ELISE_CI_DOCKER_IMAGE: $ELISE_CI_NEXUS_DOCKER_HOSTED/elise/iac-configure:$CI_COMMIT_REF_SLUG
  needs:
    - terragrunt_apply
  trigger:
    strategy: depend
    project: elise/infrastructure/iac-configure
