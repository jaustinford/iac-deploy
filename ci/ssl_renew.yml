---
ssl_renew:
  image:
    name: $ELISE_CI_NEXUS_DOCKER_HOSTED/elise/iac-deploy:$CI_COMMIT_REF_SLUG
    entrypoint: [""]
  stage: cron
  needs:
    - build_docker_terraform
  script:
    - |
      terragrunt run-all apply \
          --terragrunt-non-interactive

include:
  - project: elise/shared-cicd
    ref: main
    file: ci/triggers/ansible_playbook.yml
