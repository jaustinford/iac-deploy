---
terraform_apply:
  image:
    name: $ELISE_CI_NEXUS_DOCKER_HOSTED/elise/iac-deploy:$CI_COMMIT_REF_SLUG
    entrypoint: [""]
  stage: deploy
  needs:
    - job: build_terraform
      optional: false
  script:
    - |
      terraform apply -auto-approve

playbook_site:
  stage: trigger
  variables:
    ELISE_CI_DOCKER_IMAGE: $ELISE_CI_NEXUS_DOCKER_HOSTED/elise/iac-configure:$CI_COMMIT_REF_SLUG
  needs:
    - job: terraform_apply
      optional: false
  trigger:
    strategy: depend
    project: elise/infrastructure/iac-configure
